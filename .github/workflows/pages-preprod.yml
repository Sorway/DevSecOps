name: Deploy preprod GitHub Page

# Publie la vitrine de presentation du projet (dossier docs/) sur GitHub Pages.
# Scope volontairement limite a la branche preprod : la CD de production (frontend/)
# reste pilotee par ci-cd.yml sur main.
on:
  push:
    branches: [preprod]
    paths:
      - 'docs/**'
      - '.github/workflows/pages-preprod.yml'
  workflow_dispatch:

# Moindre privilege : lecture seule par defaut.
permissions:
  contents: read

# Un seul deploiement de preview a la fois ; le dernier push supplante le precedent.
concurrency:
  group: pages-preprod
  cancel-in-progress: true

jobs:
  deploy-preprod-page:
    name: deploy-preprod-page
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v5

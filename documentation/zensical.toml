# ============================================================================
# Configuration Zensical - SecureWallet (documentation CI/CD DevSecOps)
# Doc : https://zensical.org/docs/
# Publiee en sous-chemin /docs/ du GitHub Pages du depot (voir ci-cd.yml).
# ============================================================================

[project]
site_name = "SecureWallet · Documentation DevSecOps"
site_description = "Industrialisation, durcissement et architecture CI/CD d'une SPA statique et d'une API Node.js manipulant des données sensibles. Projet final DevSecOps, Sophia Ynov Campus."
site_author = "Équipe SecureWallet · Sophia Ynov Campus"
site_url = "https://sorway.github.io/DevSecOps/docs/"
repo_url = "https://github.com/Sorway/DevSecOps"
repo_name = "Sorway/DevSecOps"
edit_uri = "edit/main/documentation/docs/"
copyright = "Copyright &copy; 2026 Équipe SecureWallet · Sophia Ynov Campus"

docs_dir = "docs"
site_dir = "site"

extra_css = ["stylesheets/extra.css"]

nav = [
  { "Accueil" = "index.md" },
  { "Contexte & consignes" = "contexte.md" },
  { "Implémentation" = [
    { "Architecture du dépôt" = "architecture.md" },
    { "Gouvernance Git" = "gouvernance.md" },
    { "Durcissement local" = "shift-left.md" },
    { "Secrets (SOPS / age)" = "secrets.md" },
    { "SAST & scan d'images" = "sast.md" },
    { "Conteneurisation & GHCR" = "conteneurisation.md" },
    { "Pipeline CI durci" = "ci.md" },
    { "Composite Action Trivy" = "composite-action.md" },
    { "Déploiement continu" = "deploiement.md" },
    { "Robustesse & rollback" = "robustesse.md" },
  ] },
  { "Conformité" = "conformite.md" },
]

[project.theme]
language = "fr"
logo = "assets/logo_ynov_campus_sophia_white.png"
favicon = "assets/devsecops.png"
features = [
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.indexes",
  "navigation.top",
  "navigation.footer",
  "toc.follow",
  "search.highlight",
  "search.suggest",
  "content.code.copy",
  "content.code.annotate",
  "content.tooltips",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "cyan"
toggle.icon = "lucide/sun"
toggle.name = "Basculer en mode sombre"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "cyan"
toggle.icon = "lucide/moon"
toggle.name = "Basculer en mode clair"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Sorway/DevSecOps"
name = "Dépôt GitHub du projet"

[[project.extra.social]]
icon = "fontawesome/solid/graduation-cap"
link = "https://www.ynov.com"
name = "Sophia Ynov Campus"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true
title = "Sur cette page"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
